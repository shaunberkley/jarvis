# Fly.io config for Jarvis (Shaun's personal AI assistant)
# Personal Fly app, separate from any DriveClub apps.
# Reuses the same Claude Max subscription as Bob via a mounted auth token.

app = "jarvis-shaun"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  CLAUDE_CONFIG_DIR = "/data/claude"
  JARVIS_STATE_DIR = "/data/jarvis"
  MCP_CONFIG_PATH = "/app/config/mcp.json"

# Single VM, always on. No autoscaling: Jarvis needs to be available 24/7
# to respond to Telegram messages and webhook events.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"

# Persistent volume for Claude Code auth state and Jarvis local state
[mounts]
  source = "jarvis_data"
  destination = "/data"

# HTTP service for inbound webhooks (Fireflies, etc.)
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/health"

[processes]
  app = "/entry.sh"

# Secrets to set via `fly secrets set` (not committed):
#   CLAUDE_OAUTH_TOKEN          (copied from Bob's existing auth)
#   TELEGRAM_BOT_TOKEN
#   FIREFLIES_API_KEY
#   FIREFLIES_WEBHOOK_SECRET
#   GMAIL_CLIENT_ID
#   GMAIL_CLIENT_SECRET
#   GMAIL_REFRESH_TOKEN
#   GOOGLE_CALENDAR_CLIENT_ID
#   GOOGLE_CALENDAR_CLIENT_SECRET
#   GOOGLE_CALENDAR_REFRESH_TOKEN
#   LINEAR_API_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   ZEP_API_KEY
#   BROWSERBASE_API_KEY
#   BROWSERBASE_PROJECT_ID
